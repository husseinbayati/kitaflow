name: kitaflow
description: "KitaFlow — Die Bildungsplattform für Kinder von 0–10 Jahren"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & DI
  provider: ^6.1.2
  get_it: ^8.0.3

  # Navigation
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.8.3

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5

  # Data Classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  fl_chart: ^0.70.2
  cupertino_icons: ^1.0.8

  # Lokalisierung
  intl: ^0.20.2

  # Utilities
  connectivity_plus: ^6.1.4
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  file_picker: ^8.1.3
  permission_handler: ^11.3.1

  # PDF
  pdf: ^3.11.3
  printing: ^5.14.2

  # QR
  qr_flutter: ^4.1.0

  # Monitoring
  sentry_flutter: ^8.14.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  build_runner: ^2.4.15

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
